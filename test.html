<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>海航666-航班/航线可视化工具</title>
    <style>
        :root {
            --color-pink: #CE6A85;
            --color-orange: #FF8C61;
            --color-blue: #4E598C;
            --primary-color: #8E6289;
            
            --bg-color: #f5ebe0;
            --text-primary: #1D1D1F;
            --text-secondary: #666666; 
            --disclaimer-bg: rgba(255, 255, 255, 0.6); 
            
            --huge-text: rgba(0, 0, 0, 0.1); 
            --water-base: rgba(255, 246, 237, 0.35); 
            --history-bg: rgba(255, 246, 237, 0.15);
            --border-color: rgba(141, 125, 129, 0.24);

            /* 定义核心动态尺寸变量（默认按横屏PC逻辑） */
            --btn-size: clamp(220px, 28vw, 400px); 
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #000000;
                --text-primary: #F5F5F7;
                --text-secondary: #A1A1A6;
                --disclaimer-bg: rgba(255, 255, 255, 0.05); 
                
                --huge-text: rgba(255, 255, 255, 0.1); 
                --water-base: rgba(255, 255, 255, 0.08); 
                --history-bg: rgba(40, 40, 40, 0.15);
                --border-color: rgba(255, 255, 255, 0.15);
            }
        }

        /* 针对竖屏（手机/窄屏）覆盖尺寸变量 */
        @media (orientation: portrait) {
            :root {
                /* 核心：宽度不超过屏幕 70%，同时高度不超过可用区域的一半(约38dvh)，确保上下堆叠时绝对不溢出，同时最大限制 320px */
                --btn-size: min(70vw, 38dvh, 320px); 
            }
        }

        html {
            overflow: hidden;
            touch-action: none;
        }

        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            height: 100dvh; 
            font-family: system-ui, sans-serif;
            background-color: var(--bg-color);
            overflow: hidden; 
            position: relative;
            touch-action: none; 
            overscroll-behavior: none; 
        }

        .bg-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100dvh;
            z-index: 0;
            pointer-events: none;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.7;
            animation: float 20s infinite alternate ease-in-out;
        }

        @media (prefers-color-scheme: dark) {
            .orb { opacity: 0.5; filter: blur(100px); }
        }

        .orb-1 { width: 50vw; height: 50vw; min-width: 400px; background: var(--color-pink); top: -15%; left: -10%; }
        .orb-2 { width: 45vw; height: 45vw; min-width: 350px; background: var(--color-orange); bottom: -15%; right: -10%; animation-delay: -5s; animation-duration: 24s; }
        .orb-3 { width: 40vw; height: 40vw; min-width: 300px; background: var(--color-blue); top: 35%; left: 30%; animation-delay: -9s; animation-duration: 28s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(6vw, -6vh) scale(1.1); }
            66% { transform: translate(-4vw, 5vh) scale(0.9); }
            100% { transform: translate(0, 0) scale(1); }
        }

        .bg-text {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 110vw; 
            font-size: max(14vw, 180px); 
            font-weight: 900; 
            line-height: 1.1; 
            color: var(--huge-text);
            word-break: break-all; 
            text-align: justify;
            z-index: 1;
            pointer-events: none;
            user-select: none;
            mix-blend-mode: overlay; 
        }

        /* ========== 核心重构：安全分配布局层 ========== */
        .ui-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100dvh;
            display: flex;
            flex-direction: column; /* 垂直排布 */
            justify-content: space-between; /* 头、中、尾自动顶开 */
            align-items: center;
            z-index: 10;
            pointer-events: none; 
            padding: 4dvh 0 3dvh 0; /* 头尾的安全边距 */
            box-sizing: border-box;
        }

        /* --- 顶部栏（不再浮空，实打实占据物理空间） --- */
        .top-bar {
            flex-shrink: 0; /* 保证不被压缩 */
            pointer-events: auto;
        }

        .history-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 32px;
            border-radius: 30px;
            background: var(--history-bg); 
            backdrop-filter: blur(25px);   
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255,255,255,0.3); 
            color: var(--text-primary);
            text-decoration: none;
            font-size: 14px;
            font-weight: bold; 
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
        }

        .history-btn:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.4);
        }
        @media (prefers-color-scheme: dark) {
            .history-btn:hover { background: rgba(80, 80, 80, 0.4); }
        }

        /* --- 底部免责声明（实打实占据物理空间） --- */
        .disclaimer-wrapper {
            flex-shrink: 0; /* 保证不被压缩 */
            pointer-events: auto; 
        }

        .disclaimer-section {
            width: fit-content; 
            max-width: 95vw; 
            padding: 12px 20px; 
            border-radius: 30px; 
            border: 1px solid var(--border-color);
            background: var(--disclaimer-bg); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            text-align: center;
        }
        
        .disclaimer-section p {
            margin: 3px 0;
            line-height: 1.3;
            color: var(--text-secondary);
            white-space: nowrap; 
            font-size: clamp(9px, 2.6vw, 11px); 
        }
        
        .disclaimer-section a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: bold;
        }
        
        .disclaimer-section a:hover {
            text-decoration: underline;
        }

        /* --- 中心交互区域（自动填满剩余的所有空间） --- */
        .main-area {
            flex: 1; /* 吸干头部和尾部之外的所有空间 */
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none; 
            margin: 0dvh 0;
        }

        /* --- 巨型按钮通用设置 --- */
        .huge-btn {
            pointer-events: auto; 
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            /* 宽高严格绑定根变量 */
            width: var(--btn-size); 
            height: var(--btn-size); 
            text-decoration: none;
            color: var(--text-primary);
        }

        .btn-content {
            position: relative;
            z-index: 10; 
            text-align: center;
            transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .btn-title {
            display: block;
            /* 默认（横屏端）维持现状的 42% 比例 */
            font-size: calc(var(--btn-size) * 0.42);
            font-weight: 800; 
            letter-spacing: 2px;
            
            color: var(--text-primary); 
            /* [修改] 描边加粗到 5px */
            -webkit-text-stroke: 5px var(--text-primary); 
            
            text-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }
        
        .btn-subtitle {
            display: block;
            font-size: 18px; 
            color: var(--text-secondary);
            
            /* 极细字体：将字重设为 300 (Light) */
            font-weight: 300; 
            
            letter-spacing: 10px;
            margin-top: 5px;
        }

        .huge-btn:hover .btn-content { transform: scale(1.08); }

        /* --- 响应式排版逻辑 --- */
        
        /* 横屏 (PC/平板等) */
        @media (orientation: landscape) {
            .main-area {
                flex-direction: row; /* 横向排列 */
                /* 你的逻辑：间距可以为 2/3 按钮长度 */
                gap: calc(var(--btn-size) * 0.618); 
            }
        }

        /* 竖屏 (手机等) */
        @media (orientation: portrait) {
            .main-area {
                flex-direction: column; /* 纵向排列，相对中线对齐 */
                gap: 0; 
            }
            .orb-1 { width: 90vw; height: 90vw; top: -5%; left: -15%; }
            .orb-2 { width: 80vw; height: 80vw; bottom: -5%; right: -15%; }
            .orb-3 { width: 70vw; height: 70vw; top: 35%; left: 5%; }
            .bg-text { font-size: max(24vw, 90px); line-height: 1.1; width: 120vw; }
            .btn-title { font-size: calc(var(--btn-size) * 0.42); }
        }

        /* --- 幽灵水波纹 --- */
        .ripple {
            position: absolute;
            top: -15%; left: -15%;
            width: 130%; height: 130%;
            border-radius: 50%;
            background: var(--water-base);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            -webkit-mask-image: radial-gradient(circle, black 30%, transparent 65%);
            mask-image: radial-gradient(circle, black 30%, transparent 65%);
            z-index: 1;
            pointer-events: none; 
            transition: filter 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .r1 { animation: organic-drift-1 10s infinite alternate cubic-bezier(0.4, 0, 0.2, 1); }
        .r2 { animation: organic-drift-2 14s infinite alternate cubic-bezier(0.4, 0, 0.2, 1); width: 150%; height: 150%; top: -25%; left: -25%; }

        @keyframes organic-drift-1 {
            0%   { transform: translate(0px, 0px) scale(0.9); opacity: 0.4; }
            35%  { transform: translate(8%, -8%) scale(1.05); opacity: 0.9; }
            70%  { transform: translate(-8%, 5%) scale(0.95); opacity: 0.45; }
            100% { transform: translate(5%, 12%) scale(1.1); opacity: 0.95; }
        }

        @keyframes organic-drift-2 {
            0%   { transform: translate(-6%, -4%) scale(1.1); opacity: 0.8; }
            45%  { transform: translate(10%, 15%) scale(0.85); opacity: 0.25; } 
            80%  { transform: translate(5%, -12%) scale(1.0); opacity: 0.7; }
            100% { transform: translate(-12%, 6%) scale(0.95); opacity: 0.4; }
        }

        .huge-btn:hover .r1 { filter: brightness(1.6); }
        .huge-btn:hover .r2 { filter: brightness(1.3); }

    </style>
</head>
