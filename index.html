<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>海航666-航班/航线可视化工具</title>
    <style>
        :root {
            /* 彩色光球 */
            --color-pink: #CE6A85;
            --color-orange: #FF8C61;
            --color-blue: #4E598C;

            /* 免责声明与主色调 */
            --primary-color: #8E6289;
            
            /* 亮色模式 */
            --bg-color: #f5ebe0;
            --text-primary: #1D1D1F;
            --text-secondary: #86868B;
            /* 背景文字颜色 */
            --huge-text: rgba(0, 0, 0, 0.1); 
            /* 强化水波纹底色浓度，让平时更明显 */
            --water-base: rgba(255, 246, 237, 0.35); 
            --history-bg: rgba(255, 246, 237, 0.15);
            --border-color: rgba(141, 125, 129, 0.24);
        }

        /* 跟随系统暗黑模式 */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #000000;
                --text-primary: #F5F5F7;
                --text-secondary: #A1A1A6;
                --huge-text: rgba(255, 255, 255, 0.1); 
                /* 暗黑下也适度强化水波底色 */
                --water-base: rgba(255, 255, 255, 0.08); 
                --history-bg: rgba(40, 40, 40, 0.15);
                --border-color: rgba(255, 255, 255, 0.15);
            }
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            overflow: hidden; 
            position: relative;
        }

        /* ========== 1. 光球底层 ========== */
        .bg-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 0;
            pointer-events: none;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.7;
            animation: float 20s infinite alternate ease-in-out;
        }

        @media (prefers-color-scheme: dark) {
            .orb { opacity: 0.5; filter: blur(100px); }
        }

        .orb-1 { width: 50vw; height: 50vw; min-width: 400px; background: var(--color-pink); top: -15%; left: -10%; }
        .orb-2 { width: 45vw; height: 45vw; min-width: 350px; background: var(--color-orange); bottom: -15%; right: -10%; animation-delay: -5s; animation-duration: 24s; }
        .orb-3 { width: 40vw; height: 40vw; min-width: 300px; background: var(--color-blue); top: 35%; left: 30%; animation-delay: -9s; animation-duration: 28s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(6vw, -6vh) scale(1.1); }
            66% { transform: translate(-4vw, 5vh) scale(0.9); }
            100% { transform: translate(0, 0) scale(1); }
        }

        /* ========== 2. 背景文字层 ========== */
        .bg-text {
            position: absolute;
            top: 50%; 
            left: 50%;
            transform: translate(-50%, -50%);
            width: 110vw; 
            font-size: max(14vw, 180px); 
            font-weight: 900;
            line-height: 1.1; 
            color: var(--huge-text);
            word-break: break-all; 
            text-align: justify;
            z-index: 1;
            pointer-events: none;
            user-select: none;
            mix-blend-mode: overlay; 
        }

        /* ========== 3. 全新 UI 弹性布局层（自动计算空白区域居中） ========== */
        .ui-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* 将顶部、中部、底部元素自动上下推开 */
            align-items: center;
            z-index: 10;
            pointer-events: none; 
            /* 设置安全的上下边距 */
            padding: 4vh 0 3vh 0; 
        }

        /* --- 顶部栏 --- */
        .top-bar {
            position: relative;
            pointer-events: auto;
        }

        .history-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 32px;
            background: var(--history-bg); 
            backdrop-filter: blur(25px);   
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255,255,255,0.3); 
            border-radius: 30px;
            color: var(--text-primary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
        }

        .history-btn:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.4);
        }
        @media (prefers-color-scheme: dark) {
            .history-btn:hover { background: rgba(80, 80, 80, 0.4); }
        }

        /* --- 中心交互区域 (由于设置了 flex: 1，它会自动在除去头尾后的空间内绝对居中) --- */
        .main-area {
            position: relative;
            flex: 1; /* 撑满剩下的所有空间 */
            display: flex;
            flex-direction: row; 
            align-items: center;
            justify-content: center;
            gap: 12vw; 
            width: 100vw;
            pointer-events: none; 
        }

        .huge-btn {
            pointer-events: auto; 
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: clamp(280px, 32vw, 480px); 
            aspect-ratio: 1 / 1; 
            text-decoration: none;
            color: var(--text-primary);
        }

        .btn-content {
            position: relative;
            z-index: 10; 
            text-align: center;
            transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .btn-title {
            display: block;
            font-size: min(8vw, 240px);
            font-weight: 800;
            letter-spacing: 2px;
            text-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }

        .btn-subtitle {
            display: block;
            font-size: 18px; 
            color: var(--text-secondary);
            font-weight: 600;
            letter-spacing: 10px;
            margin-top: 5px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.05);
        }

        .huge-btn:hover .btn-content { transform: scale(1.08); }

        /* --- 幽灵水波纹 --- */
        .ripple {
            position: absolute;
            top: -15%; left: -15%;
            width: 130%; height: 130%;
            border-radius: 50%;
            background: var(--water-base);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            -webkit-mask-image: radial-gradient(circle, black 30%, transparent 65%);
            mask-image: radial-gradient(circle, black 30%, transparent 65%);
            z-index: 1;
            pointer-events: none; 
            /* 赋予点亮时的缓慢过渡效果 (1s 极缓点亮) */
            transition: filter 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .r1 { animation: organic-drift-1 10s infinite alternate cubic-bezier(0.4, 0, 0.2, 1); }
        .r2 { animation: organic-drift-2 14s infinite alternate cubic-bezier(0.4, 0, 0.2, 1); width: 150%; height: 150%; top: -25%; left: -25%; }

        /* 修改关键帧动画：提高基础透明度，确保不管怎么波动都可见 */
        @keyframes organic-drift-1 {
            0%   { transform: translate(0px, 0px) scale(0.9); opacity: 0.4; }
            35%  { transform: translate(8%, -8%) scale(1.05); opacity: 0.9; }
            70%  { transform: translate(-8%, 5%) scale(0.95); opacity: 0.45; }
            100% { transform: translate(5%, 12%) scale(1.1); opacity: 0.95; }
        }

        @keyframes organic-drift-2 {
            0%   { transform: translate(-6%, -4%) scale(1.1); opacity: 0.8; }
            /* 将之前会完全隐身(0)的状态提高到 0.25，保证留有浅浅的轮廓 */
            45%  { transform: translate(10%, 15%) scale(0.85); opacity: 0.25; } 
            80%  { transform: translate(5%, -12%) scale(1.0); opacity: 0.7; }
            100% { transform: translate(-12%, 6%) scale(0.95); opacity: 0.4; }
        }

        /* 移除了强硬的 transform 覆盖，只做缓动的亮度滤镜调整 */
        .huge-btn:hover .r1 { filter: brightness(1.6); }
        .huge-btn:hover .r2 { filter: brightness(1.3); }


        /* --- 底部免责声明 --- */
        .disclaimer-wrapper {
            position: relative;
            display: flex;
            justify-content: center;
            width: 100vw;
            pointer-events: none; 
        }

        .disclaimer-section {
            pointer-events: auto; 
            width: fit-content; 
            max-width: 90vw; 
            padding: 12px 30px; 
            border: 1px solid var(--border-color);
            border-radius: 25px; 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            text-align: center;
        }
        
        .disclaimer-section p {
            margin: 3px 0;
            line-height: 1.3;
            color: var(--text-secondary);
            font-size: 10px;
        }
        
        .disclaimer-section a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: bold;
        }
        
        .disclaimer-section a:hover {
            text-decoration: underline;
        }

        /* ========== 6. 移动端响应式适配 ========== */
        @media (max-width: 768px) {
            .orb-1 { width: 90vw; height: 90vw; top: -5%; left: -15%; }
            .orb-2 { width: 80vw; height: 80vw; bottom: -5%; right: -15%; }
            .orb-3 { width: 70vw; height: 70vw; top: 35%; left: 5%; }

            .bg-text { font-size: max(24vw, 90px); line-height: 1.1; width: 120vw; }

            .main-area { flex-direction: column; gap: 8vh; }
            .huge-btn { width: clamp(260px, 60vw, 400px); }
            .btn-title { font-size: min(16vw, 180px); }
        }
    </style>
</head>
